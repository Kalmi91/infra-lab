{{- if .Values.serviceMonitor.enabled }}
# Tells kube-prometheus-stack to scrape demo-app's /metrics. The stack is
# configured with serviceMonitorSelectorNilUsesHelmValues=false, so it discovers
# ServiceMonitors in any namespace regardless of release label.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: demo-app
  labels:
    app: demo-app
spec:
  selector:
    matchLabels:
      app: demo-app
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval }}
{{- end }}
