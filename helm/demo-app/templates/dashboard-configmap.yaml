{{- if .Values.dashboard.enabled }}
# The kube-prometheus-stack Grafana sidecar auto-imports ConfigMaps labeled
# grafana_dashboard. monitoring-values sets sidecar searchNamespace: ALL so this
# is picked up even though it lives in the app's namespace.
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-app-dashboard
  labels:
    grafana_dashboard: "1"
    app: demo-app
data:
  demo-app.json: |-
{{ .Files.Get "dashboards/demo-app.json" | indent 4 }}
{{- end }}
