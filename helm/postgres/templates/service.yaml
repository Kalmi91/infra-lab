apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  # Fixed name "postgres" so the app's DNS is stable:
  # postgres.<namespace>.svc.cluster.local:5432
  selector:
    app: postgres
  ports:
    - name: postgres
      port: {{ .Values.service.port }}
      targetPort: postgres
